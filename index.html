<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <!-- CSP 방어선(GitHub Pages는 응답 헤더를 못 줘서 meta 로). connect-src 는 Supabase 프로젝트 오리진만
       허용(submit/recover). script 는 로컬 파일만. frame-ancestors 는 meta 에서 무시되므로 app.js 가
       framebuster 로 보완한다. -->
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'none'; script-src 'self'; style-src 'unsafe-inline'; connect-src https://zbqtdhaqwjfazznxlzhr.supabase.co; img-src 'self' data:; base-uri 'none'; form-action 'none'" />
  <title>Todo Hero 계정</title>
  <style>
    :root {
      --bg: #1b1726;
      --card: #271f38;
      --fg: #f3eefb;
      --muted: #b3a9c9;
      --accent: #8b6df0;
      --accent-fg: #ffffff;
      --err-bg: #3a2030;
      --err-fg: #ffb4c4;
      --ok-bg: #1f3a2c;
      --ok-fg: #9fe6bd;
      --field: #1b1528;
      --border: #3a3152;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
      min-height: 100%;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border-radius: 18px;
      padding: 28px 22px 24px;
      box-shadow: 0 16px 48px rgba(0,0,0,.4);
    }
    h1 { font-size: 22px; margin: 0 0 4px; }
    .sub { color: var(--muted); font-size: 14px; margin: 0 0 20px; line-height: 1.5; }
    label { display: block; font-size: 13px; color: var(--muted); margin: 14px 0 6px; }
    input {
      width: 100%;
      padding: 14px 14px;
      font-size: 16px; /* 16px = iOS 줌 방지 */
      background: var(--field);
      border: 1px solid var(--border);
      border-radius: 11px;
      color: var(--fg);
      -webkit-appearance: none;
    }
    input:focus { outline: none; border-color: var(--accent); }
    button.primary {
      width: 100%;
      margin-top: 22px;
      padding: 15px;
      font-size: 16px;
      font-weight: 600;
      background: var(--accent);
      color: var(--accent-fg);
      border: none;
      border-radius: 11px;
      cursor: pointer;
    }
    button.primary:disabled { opacity: .55; cursor: default; }
    .switches { margin-top: 18px; font-size: 14px; text-align: center; line-height: 1.9; }
    .switches a { color: var(--accent); text-decoration: none; cursor: pointer; }
    .msg { margin-top: 16px; padding: 12px 14px; border-radius: 10px; font-size: 14px; line-height: 1.5; display: none; }
    .msg.err { background: var(--err-bg); color: var(--err-fg); display: block; }
    .msg.ok { background: var(--ok-bg); color: var(--ok-fg); display: block; }
    .hidden { display: none !important; }
    .center { text-align: center; }
    .big-ok { font-size: 40px; margin: 8px 0; }
    footer { margin-top: 20px; text-align: center; font-size: 12px; color: var(--muted); }
  </style>
</head>
<body>
  <main class="card" role="main">
    <!-- 인증 폼 뷰 -->
    <section id="form-view">
      <h1 id="title">로그인</h1>
      <p class="sub" id="subtitle"></p>

      <form id="auth-form" autocomplete="on" novalidate>
        <label for="email">이메일</label>
        <input id="email" name="email" type="email" inputmode="email"
               autocomplete="email" autocapitalize="none" spellcheck="false"
               placeholder="you@example.com" required />

        <label for="password">비밀번호</label>
        <input id="password" name="password" type="password"
               autocomplete="current-password" placeholder="비밀번호" required />

        <button type="submit" class="primary" id="submit-btn">로그인</button>
      </form>

      <div class="switches">
        <a id="to-signup" class="hidden">새 계정 만들기</a>
        <a id="to-login" class="hidden">이미 계정이 있어요 — 로그인</a>
        <br />
        <a id="to-recover">비밀번호를 잊으셨나요?</a>
      </div>

      <div class="msg" id="msg" role="alert"></div>
    </section>

    <!-- 비밀번호 찾기 뷰 -->
    <section id="recover-view" class="hidden">
      <h1>비밀번호 찾기</h1>
      <p class="sub">가입한 이메일로 재설정 링크를 보내드립니다. 메일의 링크에서 새 비밀번호를 설정한 뒤, 이 앱에서 다시 로그인하세요.</p>
      <form id="recover-form" novalidate>
        <label for="recover-email">이메일</label>
        <input id="recover-email" type="email" inputmode="email"
               autocomplete="email" autocapitalize="none" spellcheck="false"
               placeholder="you@example.com" required />
        <button type="submit" class="primary" id="recover-btn">재설정 메일 보내기</button>
      </form>
      <div class="switches"><a id="back-to-login">← 로그인으로</a></div>
      <div class="msg" id="recover-msg" role="alert"></div>
    </section>

    <!-- 비밀번호 재설정 뷰 -->
    <section id="reset-view" class="hidden">
      <h1>새 비밀번호 설정</h1>
      <p class="sub">새로 사용할 비밀번호를 입력하세요.</p>
      <form id="reset-form" novalidate>
        <label for="reset-password">새 비밀번호</label>
        <input id="reset-password" type="password" autocomplete="new-password" placeholder="6자 이상" required />
        <button type="submit" class="primary" id="reset-btn">비밀번호 변경</button>
      </form>
      <div class="msg" id="reset-msg" role="alert"></div>
    </section>

    <!-- 완료 뷰 -->
    <section id="done-view" class="hidden center">
      <div class="big-ok">✓</div>
      <h1 id="done-title">완료!</h1>
      <p class="sub" id="done-sub">게임으로 돌아가세요. 자동으로 로그인됩니다.</p>
    </section>

    <footer>Todo Hero</footer>
  </main>

  <script src="./config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
